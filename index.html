<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Pretendard Variable', Pretendard, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #16130f; }
  button, input { font-family: inherit; }
  .hi { width: 1.15em; height: 1.15em; display: inline-block; vertical-align: -0.2em; flex-shrink: 0; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  .overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 50; background: rgba(24, 19, 13, 0.55); backdrop-filter: blur(3px); }
  .hidden { display: none !important; }

  /* 시작 화면 — 한지 카드 */
  #startScreen .card { text-align: center; color: #322c24; max-width: 560px; padding: 44px 40px; background: #f5eede; border: 1px solid #d9cdb2; border-radius: 16px; box-shadow: 0 18px 50px rgba(0,0,0,0.35); }
  #startScreen h1 { font-size: 40px; margin-bottom: 10px; letter-spacing: 1px; color: #322c24; }
  #startScreen .sub { color: #6f6553; margin-bottom: 28px; font-size: 16px; line-height: 1.6; }
  #startScreen input { width: 260px; padding: 12px 16px; border-radius: 10px; border: 1px solid #c8bb9c; background: #fffdf6; color: #322c24; font-size: 16px; text-align: center; outline: none; margin-bottom: 18px; }
  #startScreen input:focus { border-color: #a8503e; }
  #startScreen input::placeholder { color: #a89b81; }
  .btn { display: inline-block; padding: 13px 34px; border-radius: 10px; border: none; cursor: pointer; font-size: 17px; font-weight: 700; background: #a8503e; color: #f8f3e7; transition: transform .1s, background .2s; }
  .btn:hover { background: #b96450; transform: translateY(-2px); }
  .btn.secondary { background: #e6dcc4; color: #4d4536; }
  .btn.secondary:hover { background: #d9cdae; }
  #startScreen .help { margin-top: 26px; color: #6f6553; font-size: 14px; line-height: 1.9; }
  #startScreen .help kbd { background: #e6dcc4; color: #4d4536; border-radius: 5px; padding: 2px 8px; font-family: inherit; }
  #sheetStatus { margin-top: 14px; font-size: 13px; color: #587d5b; }

  /* HUD — 한지 카드 */
  #hud { position: fixed; top: 16px; left: 16px; z-index: 20; color: #322c24; background: rgba(245, 238, 222, 0.93); border: 1px solid rgba(150, 134, 102, 0.45); border-radius: 12px; padding: 14px 18px; min-width: 230px; box-shadow: 0 6px 18px rgba(0,0,0,0.18); }
  #hud h2 { font-size: 15px; color: #7c4a33; margin-bottom: 10px; }
  #hud .site-row { display: flex; align-items: center; gap: 8px; font-size: 14px; padding: 4px 0; }
  #hud .dot { width: 10px; height: 10px; border-radius: 50%; background: #a8503e; flex-shrink: 0; }
  #hud .dot.done { background: #5d8a5f; }
  #hud .dist { margin-left: auto; color: #8d8168; font-size: 12px; }
  #hud .key { color: #a89b81; font-size: 11px; margin-left: 4px; }

  #minimap { position: fixed; top: 16px; right: 16px; z-index: 20; border-radius: 12px; background: rgba(245, 238, 222, 0.93); border: 1px solid rgba(150, 134, 102, 0.45); box-shadow: 0 6px 18px rgba(0,0,0,0.18); }

  #prompt { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); z-index: 20; color: #322c24; background: rgba(245, 238, 222, 0.95); border: 1px solid #a8503e; border-radius: 10px; padding: 12px 24px; font-size: 16px; box-shadow: 0 6px 18px rgba(0,0,0,0.18); }
  #prompt kbd { background: #a8503e; color: #f8f3e7; border-radius: 6px; padding: 2px 10px; font-weight: 700; font-family: inherit; }

  #controlsHint { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 15; color: #56503f; font-size: 13px; background: rgba(245, 238, 222, 0.7); padding: 8px 18px; border-radius: 9px; }

  /* 유적지 정보 / 퀴즈 패널 */
  #panel { z-index: 60; }
  #panel .card { width: min(680px, 92vw); max-height: 86vh; overflow-y: auto; background: linear-gradient(165deg, #f8f2e4, #efe6d0); border: 1px solid #d9cdb2; border-radius: 16px; padding: 32px 36px; color: #322c24; box-shadow: 0 18px 50px rgba(0,0,0,0.35); }
  #panel .badge { display: inline-block; font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 20px; background: #a8503e; color: #f8f3e7; margin-bottom: 12px; }
  #panel .badge.done { background: #5d8a5f; }
  #panel h2 { font-size: 26px; margin-bottom: 16px; color: #7c4a33; }
  #panel figure.photo { margin: 0 0 20px; }
  #panel figure.photo img { display: block; width: 100%; max-height: 320px; object-fit: cover; border-radius: 12px; border: 1px solid #d9cdb2; background: #e6dcc4; }
  #panel figure.photo figcaption { margin-top: 8px; font-size: 12.5px; line-height: 1.6; color: #8d8168; }
  #panel figure.photo figcaption a { color: #7c4a33; }
  #panel .history { font-size: 15.5px; line-height: 1.85; color: #4d4536; white-space: pre-line; margin-bottom: 24px; }
  #panel .actions { display: flex; gap: 12px; justify-content: flex-end; }

  .quiz-progress { font-size: 13px; color: #8d8168; margin-bottom: 10px; }
  .quiz-q { font-size: 19px; font-weight: 700; line-height: 1.6; margin-bottom: 20px; color: #322c24; }
  .quiz-opt { display: block; width: 100%; text-align: left; margin-bottom: 10px; padding: 14px 18px; border-radius: 10px; border: 1px solid #d0c3a4; background: #fffdf6; color: #322c24; font-size: 15.5px; cursor: pointer; transition: background .15s; }
  .quiz-opt:hover { background: #f0e8d2; }
  .quiz-opt.correct { background: #dcead6; border-color: #5d8a5f; color: #2f4a33; }
  .quiz-opt.wrong { background: #f0d8d1; border-color: #a8503e; color: #713527; }
  .quiz-feedback { margin: 14px 0 20px; padding: 14px 18px; border-radius: 10px; font-size: 14.5px; line-height: 1.7; }
  .quiz-feedback.ok { background: #e4efdd; border: 1px solid #8fb28c; color: #375c3b; }
  .quiz-feedback.no { background: #f4e0d9; border: 1px solid #c48874; color: #84402e; }

  /* 전체 완료 */
  #finishScreen .card { text-align: center; color: #322c24; max-width: 520px; padding: 40px; background: #f5eede; border: 1px solid #d9cdb2; border-radius: 16px; box-shadow: 0 18px 50px rgba(0,0,0,0.35); }
  #finishScreen h1 { font-size: 36px; color: #7c4a33; margin-bottom: 16px; }
  #finishScreen p { font-size: 16px; line-height: 1.8; color: #4d4536; margin-bottom: 26px; }

  #toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); z-index: 70; background: rgba(93, 138, 95, 0.95); color: #f8f3e7; font-weight: 700; padding: 12px 28px; border-radius: 10px; font-size: 15px; transition: opacity .4s; opacity: 0; pointer-events: none; box-shadow: 0 6px 18px rgba(0,0,0,0.2); }
</style>
</head>
<body>
<div id="app"></div>

<div id="startScreen" class="overlay">
  <div class="card">
    <h1><svg class="hi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 6.75V15m6-6v8.25m.503 3.498 4.875-2.437c.381-.19.622-.58.622-1.006V4.82c0-.836-.88-1.38-1.628-1.006l-3.869 1.934c-.317.159-.69.159-1.006 0L9.503 3.252a1.125 1.125 0 0 0-1.006 0L3.622 5.689C3.24 5.88 3 6.27 3 6.695V19.18c0 .836.88 1.38 1.628 1.006l3.869-1.934c.317-.159.69-.159 1.006 0l4.994 2.497c.317.158.69.158 1.006 0Z"/></svg> 제주 역사 탐험</h1>
    <p class="sub">제주의 항일 유적과 4·3의 현장을 찾아 떠나는 여행.<br/>네 곳의 유적지를 모두 방문하고 퀴즈를 풀어 보세요!</p>
    <input id="playerName" type="text" placeholder="탐험가 이름 (선택)" maxlength="12" />
    <br/>
    <button id="startBtn" class="btn">탐험 시작</button>
    <div class="help">
      <kbd>W A S D</kbd> / <kbd>방향키</kbd> 이동 &nbsp; <kbd>Shift</kbd> 달리기 &nbsp; <kbd>마우스 드래그</kbd> 시점 회전<br/>
      <kbd>E</kbd> 유적지 입장 &nbsp; <kbd>1</kbd>~<kbd>4</kbd> 유적지 근처로 빠른 이동
    </div>
    <div id="sheetStatus"></div>
  </div>
</div>

<div id="hud" class="hidden">
  <h2><svg class="hi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"/></svg> 유적지 탐방 <span id="progress"></span></h2>
  <div id="siteList"></div>
</div>
<canvas id="minimap" width="190" height="140" class="hidden"></canvas>
<div id="prompt" class="hidden"></div>
<div id="controlsHint" class="hidden">WASD 이동 · 드래그 시점 · E 유적지 입장 · 1~4 빠른 이동</div>

<div id="panel" class="overlay hidden">
  <div class="card" id="panelCard"></div>
</div>

<div id="finishScreen" class="overlay hidden">
  <div class="card">
    <h1><svg class="hi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16.5 18.75h-9m9 0a3 3 0 0 1 3 3h-15a3 3 0 0 1 3-3m9 0v-3.375c0-.621-.503-1.125-1.125-1.125h-.871M7.5 18.75v-3.375c0-.621.504-1.125 1.125-1.125h.872m5.007 0H9.497m5.007 0a7.454 7.454 0 0 1-.982-3.172M9.497 14.25a7.454 7.454 0 0 0 .981-3.172M5.25 4.236c-.982.143-1.954.317-2.916.52A6.003 6.003 0 0 0 7.73 9.728M5.25 4.236V4.5c0 2.108.966 3.99 2.48 5.228M5.25 4.236V2.721C7.456 2.41 9.71 2.25 12 2.25c2.291 0 4.545.16 6.75.47v1.516M7.73 9.728a6.726 6.726 0 0 0 2.748 1.35m8.272-6.842V4.5c0 2.108-.966 3.99-2.48 5.228m2.48-5.492a46.32 46.32 0 0 1 2.916.52 6.003 6.003 0 0 1-5.395 4.972m0 0a6.726 6.726 0 0 1-2.749 1.35m0 0a6.772 6.772 0 0 1-3.044 0"/></svg> 탐험 완료!</h1>
    <p id="finishText"></p>
    <button id="finishClose" class="btn secondary">계속 둘러보기</button>
  </div>
</div>

<div id="toast"></div>
